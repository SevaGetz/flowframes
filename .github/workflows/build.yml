name: Build Flowframes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Добавляем GitHub Packages n00mkrad как источник NuGet
      # NmkdUtils публикуется там — без этого restore упадёт
      - name: Add n00mkrad GitHub NuGet source
        run: |
          dotnet nuget add source `
            "https://nuget.pkg.github.com/n00mkrad/index.json" `
            --name "n00mkrad-github" `
            --username "x" `
            --password "${{ secrets.GITHUB_TOKEN }}" `
            --store-password-in-clear-text
        shell: pwsh

      - name: Restore NuGet packages
        run: dotnet restore Flowframes/Flowframes.csproj
        shell: pwsh

      - name: Build
        run: |
          dotnet build Flowframes/Flowframes.csproj `
            -c Release `
            --no-restore
        shell: pwsh

      - name: Publish
        run: |
          dotnet publish Flowframes/Flowframes.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            --no-build `
            -o ./publish
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flowframes-${{ github.sha }}
          path: ./publish/
          retention-days: 30
